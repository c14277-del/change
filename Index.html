<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 即時影像掃碼查表系統</title>
    <script src="https://unpkg.com/barcode-detector@2.2.2/dist/index.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background-color: #f5f5f7; color: #333; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #1d1d1f; }
        button { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 8px 0; }
        #start-btn { background-color: #0071e3; color: white; font-size: 18px; }
        #stop-btn { background-color: #ff453a; color: white; display: none; }
        #video-container { width: 100%; position: relative; display: none; margin-top: 10px; border-radius: 8px; overflow: hidden; background: black; }
        video { width: 100%; display: block; }
        .scan-laser { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: #34c759; transform: translateY(-50%); box-shadow: 0 0 6px #34c759; animation: laser-move 2s infinite ease-in-out; }
        @keyframes laser-move { 0%, 100% { top: 20%; } 50% { top: 80%; } }
        .form-group { margin: 20px 0; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #f2f2f7; text-align: left; display: none; }
        .result-item { margin: 8px 0; font-size: 16px; border-bottom: 1px solid #e5e5ea; padding-bottom: 8px; }
        .result-item:last-child { border: none; }
        .status-text { color: #0071e3; font-weight: bold; margin: 10px 0; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 AI 即時影像掃碼系統</h2>
    
    <button id="start-btn">📷 開啟即時動態掃描</button>
    <button id="stop-btn">🛑 關閉相機</button>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="scan-laser"></div>
    </div>

    <div id="status" class="status-text"></div>

    <div class="form-group">
        <label for="barcode-input">條碼數值：</label>
        <input type="text" id="barcode-input" placeholder="自動或手動輸入條碼值">
        <button id="search-btn" style="background-color: #34c759; color: white;">🔍 執行查表</button>
    </div>

    <div id="result-box">
        <h3 style="margin-top:0; color:#0071e3;">🔍 查詢結果</h3>
        <div id="search-result"></div>
    </div>
</div>

<script>
    // 💡 填入你剛剛部署好、新版本的 GAS 正式網址
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbytK783egSqaS3Bk1-D3IwhVCLVzOGqsr6K8HvRV0eXYqSJq0YCQ_QRdI2ULAeCQoZ9Hw/exec";

    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusDiv = document.getElementById('status');
    const barcodeInput = document.getElementById('barcode-input');
    const resultBox = document.getElementById('result-box');
    const resultDiv = document.getElementById('search-result');

    let stream = null;
    let animationFrameId = null;
    let isScanning = false;

    // 初始化 Google AI 條碼偵測器
    const barcodeDetector = new BarcodeDetector({
        formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'itf']
    });

    // 啟動即時動態鏡頭
    startBtn.addEventListener('click', async () => {
        resultBox.style.display = 'none';
        statusDiv.innerText = "正在初始化相機...";
        
        try {
            // 請求開啟後置鏡頭，並優化解析度提高辨識率
            stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            
            video.srcObject = stream;
            videoContainer.style.display = 'block';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            statusDiv.innerText = "🤖 AI 錄影掃描中，請對準條碼...";
            
            isScanning = true;
            // 觸發動態追蹤迴圈
            tick();
        } catch (err) {
            console.error(err);
            statusDiv.innerText = "";
            alert("無法開啟相機權限，或此環境不支援。");
        }
    });

    // 動態影像偵測迴圈 (每秒嘗試辨識數次)
    async function tick() {
        if (!isScanning) return;

        // 確保視訊已經有畫面數據傳入
        if (video.readyState === video.HAVE_CURRENT_DATA || video.readyState === video.HAVE_ENOUGH_DATA) {
            try {
                // 💡 AI 引擎直接對進行中的 <video> 標籤抽樣偵測！
                const barcodes = await barcodeDetector.detect(video);
                if (barcodes && barcodes.length > 0) {
                    const detectedValue = barcodes[0].rawValue;
                    console.log("即時 AI 辨識成功:", detectedValue);
                    
                    barcodeInput.value = detectedValue;
                    stopScanning(); // 成功抓到就自動停掉相機
                    
                    runGoogleSearch(detectedValue); // 執行查表
                    return; 
                }
            } catch (err) {
                console.error("即時辨識出錯:", err);
            }
        }
        // 繼續下一影格的偵測
        animationFrameId = requestAnimationFrame(tick);
    }

    // 關閉相機功能
    stopBtn.addEventListener('click', stopScanning);
    function stopScanning() {
        isScanning = false;
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        video.srcObject = null;
        videoContainer.style.display = 'none';
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        statusDiv.innerText = "";
    }

    // 手動查詢按鈕
    document.getElementById('search-btn').addEventListener('click', () => {
        runGoogleSearch(barcodeInput.value);
    });

    // 跨網域 JSONP 呼叫後端 GAS API
    function runGoogleSearch(barcode) {
        if (!barcode) {
            alert("請先輸入或掃描條碼！");
            return;
        }
        
        resultBox.style.display = 'block';
        resultDiv.innerHTML = '<p style="color:#86868b; font-style:italic;">正在連線雲端試算表查表中...</p>';

        // 動態建立 Script 標籤進行 JSONP 請求，完美突破網域限制
        const callbackName = 'gasCallback_' + Math.round(100000 * Math.random());
        window[callbackName] = function(response) {
            if (response.success) {
                resultDiv.innerHTML = `
                    <div class="result-item"><strong>料號：</strong> ${response.itemCode}</div>
                    <div class="result-item"><strong>條碼：</strong> ${response.barcode}</div>
                    <div class="result-item"><strong>品名：</strong> ${response.name}</div>
                    <div class="result-item"><strong>儲位：</strong> ${response.location}</div>
                `;
            } else {
                resultDiv.innerHTML = `<p style="color:#ff453a; font-weight:bold;">⚠️ ${response.msg}</p>`;
            }
            // 清理暫存標籤與函式
            document.body.removeChild(script);
            delete window[callbackName];
        };

        const script = document.createElement('script');
        script.src = `${GAS_API_URL}?barcode=${encodeURIComponent(barcode)}&callback=${callbackName}`;
        document.body.appendChild(script);
    }
</script>
</body>
</html>
